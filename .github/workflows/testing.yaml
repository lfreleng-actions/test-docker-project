# Docker build workflow
name: 'Build & Test Docker Image 🐳'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
    paths:
      - '**'
      - '!.github/**'
      - '!.*'
      - '!tox.ini'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Build and test Docker image ###
  build:
    name: 'Build Docker Image'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Set up QEMU for multi-platform builds
      - name: 'Set up QEMU'
        # yamllint disable-line rule:line-length
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      # Set up Docker Buildx
      - name: 'Set up Docker Buildx'
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
        with:
          install: true

      # Cache Docker layers
      - name: 'Cache Docker layers'
        # yamllint disable-line rule:line-length
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: /tmp/.buildx-cache
          key: "${{ runner.os }}-buildx-${{ github.sha }}"
          restore-keys: |
            "${{ runner.os }}-buildx-"

      # Build and export Docker image
      - name: 'Build Docker image'
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: './docker'
          push: false
          load: true
          tags: 'lf-hello-nginx:test'
          cache-from: 'type=local,src=/tmp/.buildx-cache'
          cache-to: 'type=local,dest=/tmp/.buildx-cache-new,mode=max'

      # Start the container
      - name: 'Start Docker container'
        run: |
          docker run -d --name test-container -p 8080:8080 lf-hello-nginx:test
          sleep 2

      # Test the image using http-api-tool-docker
      - name: 'Test Docker image content'
        id: content_test
        # yamllint disable rule:line-length
        uses: lfreleng-actions/http-api-tool-docker@12a062c2289831b79166269340ffb44fa2c113e9  # v1.0.7
        with:
          url: 'http://localhost:8080'
          http_method: 'GET'
          expected_http_code: '200'
          regex: 'Hello Linux Foundation'
          retries: '3'
          initial_sleep_time: '2'
          curl_timeout: '10'
          service_name: 'Docker NGINX Test'
          debug: 'false'
          show_header_json: 'false'

      # Test health endpoint
      - name: 'Test Docker image health endpoint'
        id: health_test
        # yamllint disable rule:line-length
        uses: lfreleng-actions/http-api-tool-docker@12a062c2289831b79166269340ffb44fa2c113e9  # v1.0.7
        with:
          url: 'http://localhost:8080/health'
          http_method: 'GET'
          expected_http_code: '200'
          regex: 'healthy'
          retries: '3'
          initial_sleep_time: '2'
          service_name: 'Docker NGINX Health Check'
          max_response_time: '1'
          debug: 'false'
          show_header_json: 'false'

      # Log brief test results
      - name: 'Test results summary'
        if: always()
        run: |
          echo "Content Test: ${{ steps.content_test.outcome }}"
          echo "Health Test: ${{ steps.health_test.outcome }}"

      # Stop container
      - name: 'Stop and remove container'
        if: always()
        run: |
          docker stop test-container
          docker rm test-container

      # Create job summary
      - name: 'Job summary'
        if: always()
        env:
          CONTENT_OUTCOME: "${{ steps.content_test.outcome }}"
          HEALTH_OUTCOME: "${{ steps.health_test.outcome }}"
        run: |
          {
            echo "# 🐳 Docker Image Test Results"
            echo ""
            echo "| Test | Status |"
            echo "| ---- | ------ |"
            if [[ "$CONTENT_OUTCOME" == "success" ]]; then
              echo "| Content | ✅ Pass |"
            else
              echo "| Content | ❌ Fail |"
            fi
            if [[ "$HEALTH_OUTCOME" == "success" ]]; then
              echo "| Health | ✅ Pass |"
            else
              echo "| Health | ❌ Fail |"
            fi
            if [[ "$CONTENT_OUTCOME" == "success" && \
                  "$HEALTH_OUTCOME" == "success" ]]; then
              echo "## ✅ All tests passed"
            else
              echo "## ❌ Some tests failed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Move cache to avoid growing indefinitely
      - name: 'Move cache'
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
